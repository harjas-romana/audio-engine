<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>SonicForge Icon Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            padding: 48px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            align-items: center;
        }

        h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #fff;
        }

        p {
            font-size: 11px;
            color: #808080;
            letter-spacing: 0.3px;
        }

        .icons {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        .icon-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        canvas {
            border: 1px solid #282828;
            border-radius: 4px;
            background: #000;
        }

        .icon-label {
            font-size: 10px;
            font-weight: 600;
            color: #a0a0a0;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>
    <h1>SONICFORGE STUDIO · ICON GENERATOR</h1>
    <p>Right-click each icon → Save Image As → icons/icon[size].png</p>
    <div class="icons" id="icons"></div>

    <script>
        const sizes = [16, 48, 128];
        const container = document.getElementById('icons');

        sizes.forEach(size => {
            // Create canvas
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = size;
            const ctx = canvas.getContext('2d');
            const center = size / 2;

            // Background circle
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(center, center, center, 0, Math.PI * 2);
            ctx.fill();

            // Outer ring
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = size * 0.04;
            ctx.beginPath();
            ctx.arc(center, center, center * 0.85, 0, Math.PI * 2);
            ctx.stroke();

            // Inner dashed ring
            ctx.lineWidth = size * 0.025;
            ctx.setLineDash([size * 0.05, size * 0.03]);
            ctx.beginPath();
            ctx.arc(center, center, center * 0.56, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);

            // Center circle
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(center, center, center * 0.2, 0, Math.PI * 2);
            ctx.fill();

            // Cardinal cross lines
            ctx.lineWidth = size * 0.035;
            ctx.lineCap = 'square';
            const innerR = center * 0.9;
            const outerR = center * 0.98;

            // Top
            ctx.beginPath();
            ctx.moveTo(center, center - outerR);
            ctx.lineTo(center, center - innerR);
            ctx.stroke();

            // Bottom
            ctx.beginPath();
            ctx.moveTo(center, center + innerR);
            ctx.lineTo(center, center + outerR);
            ctx.stroke();

            // Left
            ctx.beginPath();
            ctx.moveTo(center - outerR, center);
            ctx.lineTo(center - innerR, center);
            ctx.stroke();

            // Right
            ctx.beginPath();
            ctx.moveTo(center + innerR, center);
            ctx.lineTo(center + outerR, center);
            ctx.stroke();

            // Create container
            const iconDiv = document.createElement('div');
            iconDiv.className = 'icon-container';

            const label = document.createElement('div');
            label.className = 'icon-label';
            label.textContent = `icon${size}.png`;

            iconDiv.appendChild(canvas);
            iconDiv.appendChild(label);
            container.appendChild(iconDiv);
        });
    </script>
</body>

</html>
